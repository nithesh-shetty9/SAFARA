<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAFARA — Create Account</title>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px 16px">

<div style="background:var(--card);border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.10);padding:40px 36px;width:100%;max-width:440px">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px">
    <div class="header-mark" style="width:36px;height:36px;border-radius:10px;font-size:1rem">S</div>
    <span style="font-family:'Playfair Display',serif;font-weight:700;font-size:1.1rem;color:var(--navy)">SAFARA</span>
  </div>

  <h2 style="font-family:'Playfair Display',serif;font-weight:700;font-size:1.8rem;color:var(--navy);margin-bottom:8px">Create Account</h2>
  <p style="font-size:.85rem;color:var(--muted);line-height:1.6;margin-bottom:28px">Join SAFARA and help build safer routes for your city.</p>

  <div id="signup-error" class="auth-error" style="display:none"></div>

  <div class="field-row">
    <div class="field">
      <label>Full Name</label>
      <input id="name" placeholder="Priya Sharma"/>
    </div>
    <div class="field">
      <label>City</label>
      <input id="city" placeholder="Bengaluru"/>
    </div>
  </div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@email.com"/>
  </div>

  <div class="field-row">
    <div class="field">
      <label>Password</label>
      <input type="password" id="pw" placeholder="••••••"/>
    </div>
    <div class="field">
      <label>Confirm</label>
      <input type="password" id="pw2" placeholder="••••••"/>
    </div>
  </div>

  <button class="btn-primary" id="signup-btn">Create Account →</button>

  <div style="text-align:center;margin-top:16px;font-size:.84rem;color:var(--muted)">
    Already have an account?
    <a onclick="window.location.href='login.html'" style="color:var(--blue);font-weight:600;cursor:pointer">Sign in</a>
  </div>
</div>

<script src="../js/utils.js"></script>
<script>
  const btn = document.getElementById('signup-btn');
  const errEl = document.getElementById('signup-error');

  function showError(msg) { errEl.textContent = msg; errEl.style.display = 'block'; }

  async function doSignup() {
    errEl.style.display = 'none';
    const name  = document.getElementById('name').value.trim();
    const city  = document.getElementById('city').value.trim();
    const email = document.getElementById('email').value.trim();
    const pw    = document.getElementById('pw').value;
    const pw2   = document.getElementById('pw2').value;

    if (!name)                        return showError('Name is required.');
    if (!/\S+@\S+\.\S+/.test(email)) return showError('Valid email required.');
    if (DB.emailUsed(email))          return showError('Email already registered.');
    if (pw.length < 6)               return showError('Minimum 6 characters.');
    if (pw !== pw2)                   return showError('Passwords do not match.');

    btn.disabled = true;
    btn.textContent = 'Creating account…';
    await new Promise(r => setTimeout(r, 600));

    const user = DB.addUser({ name, email, pw, city, role: 'user' });
    Session.save(user);
    window.location.href = 'map.html';
  }

  btn.addEventListener('click', doSignup);
</script>
</body>
</html>
